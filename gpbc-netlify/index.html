<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPBC — Gestion Club</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   GPBC — Rouge #CC0000 · Jaune #FFD700 · Noir #111
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#CC0000;--j:#FFD700;--n:#111111;
  --bg:#0D0D0D;--bg2:#1A1A1A;--bg3:#222;
  --brd:#2A2A2A;--brd2:#333;
  --txt:#F0F0F0;--txt2:#999;--txt3:#555;
  --green:#4CAF50;--red:#FF6666;--blue:#6699FF;--purple:#CC88FF;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;line-height:1.5;min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1A0000 0%,#0D0D0D 70%);padding:20px}
.login-box{background:var(--bg2);border:.5px solid var(--brd2);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-size:28px;font-weight:800;color:var(--j);letter-spacing:-1px}
.login-sub{font-size:12px;color:var(--txt2);margin-top:4px}
.login-sub2{font-size:11px;color:var(--r);margin-top:4px;margin-bottom:28px}
.login-form{text-align:left}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input{width:100%;padding:10px 12px;border:.5px solid var(--brd2);border-radius:8px;font-size:13px;background:#111;color:var(--txt);font-family:inherit}
.fg input:focus{outline:none;border-color:var(--r)}
.login-err{background:#2A0A0A;border:.5px solid var(--r);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:12px}
.btn-login{width:100%;padding:12px;background:var(--r);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-login:hover{background:#AA0000}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* APP */
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#0A0A0A;border-bottom:2px solid var(--r);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;flex-shrink:0;position:sticky;top:0;z-index:100}
.hlogo{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,var(--r),var(--j));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.htitle{font-size:15px;font-weight:800;color:var(--j);letter-spacing:-.3px}
.hsub{font-size:10px;color:rgba(255,255,255,.4)}
.hbadge{background:var(--r);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.hright{display:flex;align-items:center;gap:10px}
.btn-logout{padding:5px 10px;background:#222;color:var(--txt2);border:.5px solid var(--brd2);border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit}
.btn-logout:hover{background:#2A0A0A;color:var(--red)}

/* NAV */
.main-nav{background:#111;border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;flex-shrink:0}
.main-nav::-webkit-scrollbar{height:0}
.nav-btn{padding:0 15px;height:42px;font-size:11px;font-weight:600;color:rgba(255,255,255,.35);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s}
.nav-btn:hover{color:rgba(255,255,255,.7)}
.nav-btn.active{color:var(--j);border-bottom-color:var(--j)}

/* PAGE */
.page{padding:14px;max-width:960px;margin:0 auto;width:100%}

/* CARD */
.card{background:var(--bg2);border:.5px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-size:10px;font-weight:700;color:var(--r);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* KPIs */
.kpis{display:grid;gap:8px;margin-bottom:14px}
.k2{grid-template-columns:1fr 1fr}
.k3{grid-template-columns:1fr 1fr 1fr}
.k4{grid-template-columns:repeat(4,1fr)}
.k5{grid-template-columns:repeat(5,1fr)}
.kpi{background:#111;border:.5px solid var(--brd);border-radius:9px;padding:11px 8px;text-align:center}
.kpi-val{font-size:18px;font-weight:800;line-height:1.1;margin-bottom:3px}
.kpi-label{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.kpi.hl{border-color:var(--r);background:#1A0000}
.kpi.gold{border-color:var(--j);background:#1A1400}

/* FORMS */
.row{display:grid;gap:8px;margin-bottom:8px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:1fr 1fr 1fr}
.r4{grid-template-columns:repeat(4,1fr)}
label{display:block;font-size:10px;font-weight:600;color:var(--txt2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:8px 10px;border:.5px solid var(--brd2);border-radius:7px;font-size:12px;background:#111;color:var(--txt);font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--r)}
textarea{resize:vertical;min-height:60px}

/* BOUTONS */
.btn{padding:8px 14px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-r{background:var(--r);color:#fff}.btn-r:hover{background:#AA0000}
.btn-j{background:var(--j);color:var(--n)}.btn-j:hover{background:#E5C200}
.btn-g{background:#222;color:var(--txt2);border:.5px solid var(--brd2)}.btn-g:hover{background:var(--bg3)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:5px 9px;font-size:10px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* TYPE TOGGLE */
.type-toggle{display:grid;border:.5px solid var(--brd2);border-radius:7px;overflow:hidden}
.t-btn{padding:8px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;color:var(--txt3);background:#111;transition:all .15s}
.t-rec{background:#0A2A0A;color:var(--green)}
.t-dep{background:#2A0A0A;color:var(--red)}
.t-lic{background:#0A0A2A;color:var(--blue)}
.t-com{background:#2A1A00;color:var(--j)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:7px 9px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--txt3);background:#111;border-bottom:.5px solid var(--brd)}
td{padding:8px 9px;border-bottom:.5px solid var(--brd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1E1E1E}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.b-g{background:#0A2A0A;color:var(--green);border:.5px solid var(--green)}
.b-r{background:#2A0A0A;color:var(--red);border:.5px solid var(--r)}
.b-a{background:#2A1A00;color:var(--j);border:.5px solid var(--j)}
.b-b{background:#0A0A2A;color:var(--blue);border:.5px solid #3366CC}
.b-p{background:#1A0A2A;color:var(--purple);border:.5px solid #8844CC}
.b-x{background:#1A1A1A;color:#888;border:.5px solid #444}

/* BOXES */
.info-box{background:#0A0A1A;border:.5px solid #3366CC;border-radius:7px;padding:9px 12px;margin-bottom:10px;font-size:11px;line-height:1.7;color:#8899CC}
.warn-box{background:#1A1000;border:.5px solid var(--j);border-radius:7px;padding:9px 12px;margin-bottom:10px;font-size:11px;line-height:1.7;color:#CCAA44}
.ok-box{background:#0A1A0A;border:.5px solid var(--green);border-radius:7px;padding:9px 12px;margin-bottom:10px;font-size:11px;line-height:1.7;color:var(--green)}
.ia-box{background:#0A0A1A;border:.5px solid #3366CC;border-radius:8px;padding:11px;margin-top:10px;font-size:12px;line-height:1.7}
.ia-label{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* CHAT */
.chat-wrap{background:#0D0D0D;border:.5px solid var(--brd);border-radius:10px;overflow:hidden}
.chat-msgs{padding:14px;min-height:180px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 13px;border-radius:10px;font-size:12px;line-height:1.7;max-width:85%;white-space:pre-wrap}
.msg-bot{background:var(--bg2);align-self:flex-start;border-bottom-left-radius:3px}
.msg-user{background:var(--r);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.chat-in-row{display:flex;gap:8px;padding:10px;border-top:.5px solid var(--brd)}
.chat-in{flex:1;padding:8px 11px;border:.5px solid var(--brd2);border-radius:7px;font-size:12px;background:#111;color:var(--txt);font-family:inherit}

/* MISC */
.sep{height:.5px;background:var(--brd);margin:12px 0}
.sec-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px;padding-bottom:5px;border-bottom:.5px solid var(--brd)}
.empty{padding:32px;text-align:center;color:var(--txt3);font-size:12px}
.hidden{display:none!important}
.text-g{color:var(--green)}.text-r{color:var(--red)}.text-j{color:var(--j)}.text-b{color:var(--blue)}
.typing{display:inline-block;width:5px;height:5px;background:var(--blue);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.auto-link{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--j);font-weight:600;background:#1A1400;border:.5px solid var(--j);padding:1px 6px;border-radius:20px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.dash-mod{background:#111;border:.5px solid var(--brd);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.dash-mod:hover{border-color:var(--r);background:#1A0000;transform:translateY(-2px)}
.dash-mod-icon{font-size:26px;margin-bottom:6px}
.dash-mod-name{font-size:12px;font-weight:700;margin-bottom:2px}
.dash-mod-desc{font-size:10px;color:var(--txt3)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* LOADING */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:12px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--brd2);border-top-color:var(--r);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .k5{grid-template-columns:repeat(3,1fr)}
  .k4{grid-template-columns:repeat(2,1fr)}
  .r3,.r4{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:repeat(2,1fr)}
  .page{padding:10px}
}
</style>
</head>
<body>

<script>
const SUPABASE_URL = https://ofuvlxyctdjbqxixwetx.supabase.co';
const SUPABASE_KEY = sb_publishable_k6xnXMzLrvfarMnv5K5mnQ_m2Z2Ldmi';
const ANTHROPIC_KEY = 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';
</script>

<!-- CHARGEMENT -->
<div id="loading" class="loading-screen">
  <div style="font-size:48px">🦅</div>
  <div class="loading-spinner"></div>
  <div style="color:var(--j);font-weight:700">GPBC — Chargement...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-box">
    <div class="login-logo">🦅</div>
    <h1 class="login-title">GPBC</h1>
    <p class="login-sub">Graveson Provence Basket Club</p>
    <p class="login-sub2">Club 100% féminin · Saison 2026-2027</p>
    <div class="login-form">
      <div class="fg"><label>Email</label><input type="email" id="l-email" placeholder="votre@email.com" autocomplete="email"></div>
      <div class="fg"><label>Mot de passe</label><input type="password" id="l-pass" placeholder="••••••••"></div>

      <button class="btn-login" id="btn-login" onclick="doLogin()">Se connecter</button>
    </div>
    <p style="margin-top:16px;font-size:10px;color:var(--txt3)">Première connexion : utilisez les identifiants transmis par Olivier</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="hlogo">🦅</div>
      <div><div class="htitle">GPBC</div><div class="hsub" id="h-sub">Chargement...</div></div>
    </div>
    <div class="hright">
      <span class="hbadge" id="h-role">—</span>
      <span style="font-size:10px;color:var(--j);font-weight:600">2026-2027</span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <nav class="main-nav" id="main-nav"></nav>
  <main id="main-content" style="flex:1;overflow-y:auto"></main>
</div>

<script>
// ============================================================
// INITIALISATION SUPABASE
// ============================================================
const { createClient } = supabase;
const DB = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// ÉTAT GLOBAL
// ============================================================
let STATE = {
  user: null,
  role: null,
  module: 'dashboard',
};

const TARIFS = {
  U5:{prix:110,comite:51},U7:{prix:110,comite:51},U9:{prix:110,comite:51},
  U11:{prix:150,comite:71},U13:{prix:150,comite:71},U15:{prix:170,comite:71},
  U18:{prix:170,comite:71},Seniors:{prix:130,comite:95},'Bénévole':{prix:0,comite:42}
};
const CAT_ORDER = ['U5','U7','U9','U11','U13','U15','U18','Seniors'];

const PERMISSIONS = {
  admin:      ['tresorerie','licences','sportif','subventions','sponsoring','reunions','communication','agent','admin','boucle'],
  tresoriere: ['tresorerie','licences'],
  secretaire: ['licences','reunions'],
  comm:       ['communication','sportif'],
  coach:      ['sportif'],
};

const MODULES = [
  {id:'dashboard',icon:'🏠',label:'Accueil',perm:null},
  {id:'tresorerie',icon:'💰',label:'Trésorerie',perm:'tresorerie'},
  {id:'licences',icon:'🏀',label:'Licences',perm:'licences'},
  {id:'sportif',icon:'⚽',label:'Sportif',perm:'sportif'},
  {id:'subventions',icon:'📄',label:'Subventions',perm:'subventions'},
  {id:'sponsoring',icon:'🤝',label:'Sponsors',perm:'sponsoring'},
  {id:'reunions',icon:'📅',label:'Réunions',perm:'reunions'},
  {id:'communication',icon:'📱',label:'Comm.',perm:'communication'},
  {id:'agent',icon:'🤖',label:'Agent IA',perm:'agent'},
  {id:'admin',icon:'⚙️',label:'Admin',perm:'admin'},
  {id:'boucle',icon:'🔄',label:'Boucle',perm:'boucle'},
];

// ============================================================
// UTILITAIRES
// ============================================================
const fmt = n => typeof n==='number'?n.toLocaleString('fr-FR',{minimumFractionDigits:2}):'0,00';
const today = () => new Date().toISOString().split('T')[0];
const fmtD = d => d?new Date(d+'T12:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}):'';
const fmtDL = d => d?new Date(d+'T12:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
const hasPerm = p => !p || (PERMISSIONS[STATE.role]||[]).includes(p) || STATE.role==='admin';

function toast(msg, ok=true){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:8px;font-size:12px;font-weight:700;background:${ok?'#0A2A0A':'#2A0A0A'};color:${ok?'#4CAF50':'#FF6666'};border:.5px solid ${ok?'#4CAF50':'#CC0000'};box-shadow:0 4px 20px rgba(0,0,0,.4)`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

async function copyText(t){
  try{await navigator.clipboard.writeText(t);toast('✅ Copié !');}
  catch{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ Copié !');}
}

function getTarif(cat,surcl=false,fratrie=false){
  let c=cat;
  if(surcl){const i=CAT_ORDER.indexOf(cat);if(i>=0&&i<CAT_ORDER.length-1)c=CAT_ORDER[i+1];}
  const t=TARIFS[c]||{prix:0,comite:0};
  let prix=t.prix;
  if(fratrie&&prix>0)prix-=10;
  return{prix,comite:t.comite,net:prix-t.comite,catEff:c};
}

// ============================================================
// AUTH
// ============================================================
async function checkAuth(){
  try{
    // Vérifier session Supabase
    const {data:{session}}=await DB.auth.getSession();
    if(session){
      // Récupérer le profil utilisateur
      const {data:user}=await DB.from('utilisateurs').select('*').eq('email',session.user.email).single();
      if(user&&user.actif){
        STATE.user=user;
        STATE.role=user.role;
        showApp();
        return;
      }
    }
  }catch(e){}
  showLogin();
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('l-err');
  if(!email||!pass){showErr('Email et mot de passe requis');return;}
  btn.disabled=true;btn.textContent='Connexion...';err.classList.add('hidden');
  try{
    // Chercher l'utilisateur dans notre table
    const {data:users,error}=await DB.from('utilisateurs').select('*').eq('email',email).eq('actif',true);
    if(error||!users||users.length===0){showErr('Email ou mot de passe incorrect');btn.disabled=false;btn.textContent='Se connecter';return;}
    const user=users[0];
    // Vérification simple du mot de passe (hash stocké)
    // Pour la prod on utilise Supabase Auth — ici on compare le hash bcrypt côté client
    const ok = await verifyPassword(pass, user.password_hash);
    if(!ok){showErr('Email ou mot de passe incorrect');btn.disabled=false;btn.textContent='Se connecter';return;}
    STATE.user=user;STATE.role=user.role;
    // Mettre à jour last_login
    await DB.from('utilisateurs').update({last_login:new Date().toISOString()}).eq('id',user.id);
    showApp();
  }catch(e){showErr('Erreur de connexion. Vérifiez votre connexion internet.');console.error(e);}
  btn.disabled=false;btn.textContent='Se connecter';
}

// Vérification mot de passe simple (comparaison texte pour V1)
async function verifyPassword(pass, hash){
  // Version 1 : comparaison directe (les mots de passe sont stockés en clair pour V1)
  // Version 2 : on utilisera bcrypt via Supabase Auth
  return pass===hash;
}

function showErr(msg){const e=document.getElementById('l-err');e.textContent=msg;e.classList.remove('hidden');}

async function doLogout(){
  STATE.user=null;STATE.role=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

function showLogin(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  // Écouter Enter
  document.getElementById('l-pass').onkeydown=e=>{if(e.key==='Enter')doLogin();};
}

function showApp(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('h-sub').textContent=`${STATE.user.prenom} ${STATE.user.nom} · ${STATE.role}`;
  document.getElementById('h-role').textContent=STATE.role.toUpperCase();
  buildNav();
  navigate('dashboard');
}

function buildNav(){
  const nav=document.getElementById('main-nav');
  nav.innerHTML='';
  MODULES.filter(m=>hasPerm(m.perm)).forEach(m=>{
    const btn=document.createElement('button');
    btn.className='nav-btn';btn.dataset.m=m.id;
    btn.innerHTML=`${m.icon} ${m.label}`;
    btn.onclick=()=>navigate(m.id);
    nav.appendChild(btn);
  });
}

function navigate(id){
  STATE.module=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===id));
  const c=document.getElementById('main-content');c.innerHTML='';
  const handlers={
    dashboard:renderDashboard,tresorerie:renderTresorerie,licences:renderLicences,
    sportif:renderSportif,subventions:renderSubventions,sponsoring:renderSponsoring,
    reunions:renderReunions,communication:renderCommunication,agent:renderAgent,
    admin:renderAdmin,boucle:renderBoucle
  };

function modDesc(id,lics,solde){

  return d[id]||'';
}

let currentType='recette';
function setType(t,el){
  currentType=t;
  document.querySelectorAll('.t-btn').forEach(b=>{b.className='t-btn';});
  if(el){const cls={recette:'t-rec',depense:'t-dep',licence:'t-lic',comite:'t-com'};el.classList.add(cls[t]||'');}
  document.getElementById('form-std').classList.toggle('hidden',t==='licence'||t==='comite');
  document.getElementById('form-lic').classList.toggle('hidden',t!=='licence');
  document.getElementById('form-com').classList.toggle('hidden',t!=='comite');
  if(t!=='licence'&&t!=='comite')updateCats(t);
}

function updateCats(t){
  const sel=document.getElementById('e-cat');if(!sel)return;
  const cats=t==='recette'?['Subvention publique','Don / Sponsor','Adhésion / Licence','Pass Sport','Buvette','Remboursement','Autre recette']:['Arbitrage','Équipement','Événement','Assurance','Frais bancaires','Communication','Autre dépense'];
  sel.innerHTML='<option value="">-- Choisir --</option>'+cats.map(c=>`<option>${c}</option>`).join('');
}

function updateTarif(){
  const cat=document.getElementById('l-cat')?.value;if(!cat)return;
  const surcl=document.getElementById('l-surcl')?.value==='oui';
  const fratrie=document.getElementById('l-fratrie')?.value==='oui';
  const {prix,comite,net}=getTarif(cat,surcl,fratrie);
  const ch=+document.getElementById('l-ch')?.value||0;
  const es=+document.getElementById('l-es')?.value||0;
  const vi=+document.getElementById('l-vi')?.value||0;
  const ps=+document.getElementById('l-ps')?.value||0;
  const cc=+document.getElementById('l-cc')?.value||0;
  const ha=+document.getElementById('l-ha')?.value||0;
  const total=ch+es+vi+ps+cc+ha;
  const restant=Math.max(0,prix-total);
  const box=document.getElementById('tarif-box');if(!box)return;
  box.innerHTML=`Tarif : <strong>${fmt(prix)} €</strong> · Comité : <strong style="color:var(--j)">${fmt(comite)} €</strong> · Net club : <strong>${fmt(net)} €</strong><br>Perçu : <strong style="color:var(--green)">${fmt(total)} €</strong> · Restant : <strong style="color:${restant>0?'var(--red)':'var(--green)'}">${fmt(restant)} €</strong> <span class="auto-link">⚡ → Trésorerie auto</span>`;
}

async function saisirEcriture(){
  const btn=document.getElementById('btn-saisir');
  btn.disabled=true;btn.textContent='Enregistrement...';
  try{
    if(currentType==='licence'){
      const prenom=document.getElementById('l-prenom').value.trim();
      const nom=document.getElementById('l-nom').value.trim();
      const cat=document.getElementById('l-cat').value;
      if(!prenom||!nom||!cat){toast('Prénom, nom et catégorie requis',false);return;}
      const surcl=document.getElementById('l-surcl').value==='oui';
      const fratrie=document.getElementById('l-fratrie').value==='oui';
      const {prix,comite,net,catEff}=getTarif(cat,surcl,fratrie);
      const ch=+document.getElementById('l-ch').value||0;
      const es=+document.getElementById('l-es').value||0;
      const vi=+document.getElementById('l-vi').value||0;
      const ps=+document.getElementById('l-ps').value||0;
      const cc=+document.getElementById('l-cc').value||0;
      const ha=+document.getElementById('l-ha').value||0;
      const encaisse=ch+es+vi+ha;
      const total=encaisse+ps+cc;
      const restant=Math.max(0,prix-total);
      const statut=restant===0?'VALIDÉE':total===0?'IMPAYÉE':'PARTIELLE';

      const {error:licErr}=await DB.from('licences').insert({
        prenom,nom,date_naissance:document.getElementById('l-ddn').value||null,
        email:document.getElementById('l-email2').value||null,telephone:document.getElementById('l-tel').value||null,
        categorie:cat,categorie_effective:catEff,surclassement:surcl,fratrie,
        tarif:prix,part_comite:comite,net_club:net,
        pmt_cheque:ch,pmt_especes:es,pmt_virement:vi,pmt_pass_sport:ps,pmt_carte_collegiale:cc,pmt_helloasso:ha,
        total_percu:total,restant_du:restant,statut,source:'Manuel',saison:'2026-2027',
        consentement_rgpd:true,date_consentement:new Date().toISOString(),created_by:STATE.user.id
      });
      if(licErr)throw licErr;

      // Lien auto → trésorerie
      if(encaisse>0){
        await DB.from('ecritures').insert({type:'recette',date:today(),montant:encaisse,categorie:'Adhésion / Licence',tiers:`${prenom} ${nom} (${cat})`,mode:'Multi',description:`Licence ${cat} ${statut}`,est_licence:true,created_by:STATE.user.id});
      }
      if(ps>0) await DB.from('ecritures').insert({type:'recette',date:today(),montant:ps,categorie:'Pass Sport',tiers:`${prenom} ${nom}`,mode:'Décalé',en_attente:true,est_licence:true,created_by:STATE.user.id,description:''});
      if(cc>0) await DB.from('ecritures').insert({type:'recette',date:today(),montant:cc,categorie:'Carte Collégiale',tiers:`${prenom} ${nom}`,mode:'Décalé',en_attente:true,est_licence:true,created_by:STATE.user.id,description:''});

      const iaBox=document.getElementById('t-ia');const iaText=document.getElementById('t-ia-text');
      iaBox.classList.remove('hidden');
      iaText.textContent=`✅ Licence ${prenom} ${nom} (${cat}) enregistrée. Tarif : ${fmt(prix)} € · Part comité : ${fmt(comite)} € · Statut : ${statut}${restant>0?' · Reste '+fmt(restant)+' €':''}`;
      toast(`✅ Licence ${prenom} ${nom} enregistrée — ${statut}`);
      await loadKPIs();

    } else if(currentType==='comite'){
      const montant=+document.getElementById('c-montant').value;
      if(!montant){toast('Montant requis',false);return;}
      const date=document.getElementById('c-date').value;
      const dest=document.getElementById('c-dest').value;
      const lib=document.getElementById('c-lib').value;
      await DB.from('versements_comite').insert({date,montant,destinataire:dest,libelle:lib});
      await DB.from('ecritures').insert({type:'depense',date,montant,categorie:'Versement comité',tiers:dest,mode:'Virement',description:lib,est_comite:true,created_by:STATE.user.id});
      toast(`✅ Versement ${fmt(montant)} € → ${dest} enregistré`);
      await loadKPIs();

    } else {
      const montant=+document.getElementById('e-montant').value;
      const tiers=document.getElementById('e-tiers').value.trim();
      if(!montant||!tiers){toast('Montant et tiers requis',false);return;}
      await DB.from('ecritures').insert({
        type:currentType,date:document.getElementById('e-date').value,montant,
        categorie:document.getElementById('e-cat').value,tiers,
        mode:document.getElementById('e-mode').value,description:document.getElementById('e-desc').value,
        en_attente:false,est_comite:false,est_licence:false,created_by:STATE.user.id
      });
      toast(`✅ ${currentType==='recette'?'Recette':'Dépense'} de ${fmt(montant)} € enregistrée`);
      await loadKPIs();
    }
  }catch(e){toast('Erreur : '+e.message,false);console.error(e);}
  btn.disabled=false;btn.textContent='Enregistrer';
}

async function loadKPIs(){
  const [ecrR,versR]=await Promise.all([DB.from('ecritures').select('type,montant,en_attente,est_comite'),DB.from('versements_comite').select('montant')]);
  const ecr=ecrR.data||[];const vers=versR.data||[];
  const rec=ecr.filter(e=>e.type==='recette'&&!e.en_attente).reduce((s,e)=>s+e.montant,0);
  const dep=ecr.filter(e=>e.type==='depense'&&!e.est_comite).reduce((s,e)=>s+e.montant,0);
  const verse=vers.reduce((s,v)=>s+v.montant,0);
  const {data:lics}=await DB.from('licences').select('part_comite').eq('saison','2026-2027');
  const totalDu=(lics||[]).reduce((s,l)=>s+l.part_comite,0);
  const restant=Math.max(0,totalDu-verse);
  const solde=rec-dep-verse-restant;
  const el=document.getElementById('t-kpis');if(!el)return;
  el.innerHTML=`<div class="kpis k5">
    ${kpi('① Recettes',fmt(rec)+' €','var(--green)','')}
    ${kpi('② Dép. club',fmt(dep)+' €','var(--red)','')}
    ${kpi('③ Versé comités',fmt(verse)+' €','var(--j)','')}
    ${kpi('④ Restant comités',fmt(restant)+' €','var(--purple)','')}
    ${kpi('⑤ Solde net',(solde>=0?'+':'')+fmt(solde)+' €',solde>=0?'var(--green)':'var(--red)','hl')}
  </div>`;
}

function tSubTab(t){
  ['saisie','tableau','bilan'].forEach(s=>{document.getElementById('t-'+s)?.classList.toggle('hidden',s!==t);});
  if(t==='tableau')loadTableau();
  if(t==='bilan')loadBilan();
}

  el.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Tiers</th><th>Catégorie</th><th>Montant</th></tr></thead><tbody>
  ${ecr.map(e=>`<tr><td>${fmtD(e.date)}</td>

  <td><strong>${e.tiers||'—'}</strong></td>
  <td style="color:var(--txt3);font-size:10px">${e.categorie||'—'}</td>
  <td class="${e.type==='recette'?'text-g':'text-r'}" style="font-weight:700">${e.type==='recette'?'+':'-'}${fmt(e.montant)} €</td>
  </tr>`).join('')}
  </tbody></table></div>`;
}

async function loadBilan(){
  const {data:ecr}=await DB.from('ecritures').select('type,montant,categorie,en_attente,est_comite');
  const {data:vers}=await DB.from('versements_comite').select('montant');
  const el=document.getElementById('t-bilan-content');if(!el)return;
  const produits={};
  (ecr||[]).filter(e=>e.type==='recette'&&!e.en_attente).forEach(e=>{produits[e.categorie||'Autre']=(produits[e.categorie||'Autre']||0)+e.montant;});
  const charges={};
  (ecr||[]).filter(e=>e.type==='depense'&&!e.est_comite).forEach(e=>{charges[e.categorie||'Autre']=(charges[e.categorie||'Autre']||0)+e.montant;});
  if(vers&&vers.length>0)charges['Versements comités']=(vers||[]).reduce((s,v)=>s+v.montant,0);
  const totalP=Object.values(produits).reduce((s,v)=>s+v,0);
  const totalC=Object.values(charges).reduce((s,v)=>s+v,0);
  const res=totalP-totalC;
  el.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div><div style="background:#0A2A0A;padding:8px 12px;border-radius:6px 6px 0 0;font-weight:700;font-size:11px;color:var(--green)">PRODUITS</div>
  ${Object.entries(produits).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 12px;border-bottom:.5px solid var(--brd);font-size:11px"><span style="color:#888">${k}</span><span class="text-g">+${fmt(v)} €</span></div>`).join('')}
  <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#111;font-weight:700"><span>TOTAL</span><span class="text-g">+${fmt(totalP)} €</span></div></div>
  <div><div style="background:#2A0A0A;padding:8px 12px;border-radius:6px 6px 0 0;font-weight:700;font-size:11px;color:var(--red)">CHARGES</div>
  ${Object.entries(charges).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 12px;border-bottom:.5px solid var(--brd);font-size:11px"><span style="color:#888">${k}</span><span class="text-r">-${fmt(v)} €</span></div>`).join('')}
  <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#111;font-weight:700"><span>TOTAL</span><span class="text-r">-${fmt(totalC)} €</span></div></div>
  </div>

function filterLics(){

    const ms=!s||(l.nom+l.prenom+(l.email||'')).toLowerCase().includes(s);
    const mc=!cat||l.categorie===cat;
    return ms&&mc;
  });
  const el=document.getElementById('lics-table');if(el)el.innerHTML=renderLicsTable(filtered);
}

async function importCSV(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text();
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2){document.getElementById('csv-result').innerHTML='<div class="warn-box">Fichier vide ou invalide.</div>';return;}
  const headers=lines[0].split(';').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  let imported=0,errors=0;
  for(let i=1;i<lines.length;i++){
    const vals=lines[i].split(';').map(v=>v.trim().replace(/"/g,''));
    const row={};headers.forEach((h,j)=>row[h]=vals[j]||'');
    try{
      const prenom=row['prénom']||row['prenom']||row['firstname']||'';
      const nom=row['nom']||row['lastname']||row['name']||'';
      const montant=parseFloat((row['montant']||row['amount']||'0').replace(',','.'));
      const email=row['email']||'';
      const date=row['date']||today();
      if(!prenom||!nom||!montant){errors++;continue;}
      await DB.from('licences').insert({prenom,nom,email,tarif:montant,total_percu:montant,restant_du:0,statut:'VALIDÉE',source:'HelloAsso',categorie:'À définir',saison:'2026-2027',pmt_helloasso:montant,consentement_rgpd:true,date_consentement:new Date().toISOString(),created_by:STATE.user.id});
      await DB.from('ecritures').insert({type:'recette',date,montant,categorie:'Adhésion / Licence',tiers:`${prenom} ${nom}`,mode:'HelloAsso',description:'Import CSV HelloAsso',est_licence:true,created_by:STATE.user.id});
      imported++;
    }catch(e){errors++;}
  }
  document.getElementById('csv-result').innerHTML=`<div class="${errors===0?'ok-box':'warn-box'}">✅ ${imported} licence(s) importée(s)${errors>0?' · '+errors+' erreur(s) ignorée(s)':''} <span class="auto-link">⚡ Trésorerie mise à jour</span></div>`;
  toast(`✅ ${imported} licences importées depuis HelloAsso`);
}

async function saisirResultat(id,adv,cat){
  const sg=prompt(`Score GPBC vs ${adv} ?`);if(sg===null)return;
  const sa=prompt(`Score ${adv} ?`);if(sa===null)return;
  const res=+sg>+sa?'V':+sg<+sa?'D':'N';
  await DB.from('matchs').update({score_gpbc:+sg,score_adversaire:+sa,resultat:res}).eq('id',id);
  toast(`✅ Résultat saisi — ${res==='V'?'Victoire':res==='D'?'Défaite':'Nul'}`);
  // Générer post IA
  genererPostResultat(cat,adv,sg,sa,res);
  renderSportif(document.getElementById('main-content'));
}

async function genererPostResultat(cat,adv,sg,sa,res){
  const label=res==='V'?'VICTOIRE':res==='D'?'DÉFAITE':'MATCH NUL';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages:[{role:'user',content:`Post Instagram GPBC (basket 100% féminin, Graveson 13). ${cat} · GPBC ${sg}-${sa} ${adv} · ${label}. Max 100 mots, emojis, hashtags #GPBC #BasketFéminin #Graveson. Direct, pas d'introduction.`}]})});
    const d=await r.json();
    const txt=d.content?.find(b=>b.type==='text')?.text||'';
    if(txt){
      document.getElementById('post-ia').classList.remove('hidden');
      document.getElementById('post-ia-text').textContent=txt;
    }
  }catch(e){}
}

async function envoyerConvocation(id){

  window.open(`mailto:?subject=${subj}&body=${body}`);
}

    DB.from('ecritures').select('type,montant,en_attente,est_comite,tiers,date').order('date',{ascending:false}).limit(20),

  const dep=ecr.filter(e=>e.type==='depense'&&!e.est_comite).reduce((s,e)=>s+e.montant,0);
  const impayees=lics.filter(l=>l.restant_du>0);

  const context=`GPBC — Graveson Provence Basket Club — Saison 2026-2027

SIRET : 913 100 335 00011 · RNA : W132009712

TRÉSORERIE : Recettes ${fmt(rec)} € · Dépenses ${fmt(dep)} € · Solde estimé ${fmt(rec-dep)} €

IMPAYÉES : ${impayees.map(l=>`${l.prenom} ${l.nom} (${fmt(l.restant_du)} €)`).join(', ')||'Aucune'}

SPONSORS : ${sps.map(s=>`${s.nom} (${fmt(s.montant)} €, ${s.statut})`).join(', ')}
DONS : ${dons.length} dons · Total ${fmt(dons.reduce((s,d)=>s+d.montant,0))} €
SUBVENTIONS POTENTIELLES : FDVA 3000€ (Fév2027) · CD13 4000€ (Sept2026) · Région 5000€ (Oct-Déc2026) · FFBB PSF 2500€ · ANS 3500€ = 18000€ total

Question : ${msg}`;

  try{

async function changerMDP(id,nom){
  const mdp=prompt(`Nouveau mot de passe pour ${nom} :`);
  if(!mdp||mdp.length<4){toast('Mot de passe trop court',false);return;}
  // Stocker en clair pour V1 (dans V2 on utilisera Supabase Auth avec bcrypt)
  await DB.from('utilisateurs').update({password_hash:mdp}).eq('id',id);
  toast(`✅ Mot de passe de ${nom} changé`);
  await DB.from('logs').insert({utilisateur_id:STATE.user.id,action:'CHANGE_MDP',details:`MDP changé pour ${nom}`});
}

async function ajouterUtilisateur(){
  const prenom=document.getElementById('nu-prenom').value.trim();
  const nom=document.getElementById('nu-nom').value.trim();
  const email=document.getElementById('nu-email').value.trim();
  const pass=document.getElementById('nu-pass').value;
  const role=document.getElementById('nu-role').value;
  if(!prenom||!nom||!email||!pass){toast('Tous les champs sont requis',false);return;}
  const {error}=await DB.from('utilisateurs').insert({prenom,nom,email,password_hash:pass,role,actif:true});
  if(error){toast('Erreur : '+error.message,false);return;}
  await DB.from('logs').insert({utilisateur_id:STATE.user.id,action:'USER_CREATE',details:`${prenom} ${nom} (${role})`});
  toast(`✅ ${prenom} ${nom} ajouté avec le rôle ${role}`);
  renderAdmin(document.getElementById('main-content'));
}

async function archiverSaison(){
  if(!confirm('Confirmer l\'archivage de la saison 2025-2026 ? Cette action est définitive.'))return;
  const [ecrR,licR,matchR,donR,reunR]=await Promise.all([
    DB.from('ecritures').select('*'),DB.from('licences').select('*'),
    DB.from('matchs').select('*'),DB.from('dons').select('*'),DB.from('reunions').select('*'),
  ]);
  const archive={saison:'2025-2026',date_archive:new Date().toISOString(),ecritures:ecrR.data,licences:licR.data,matchs:matchR.data,dons:donR.data,reunions:reunR.data};
  const {error}=await DB.from('archives').insert({saison:'2025-2026',donnees:archive});
  if(error){toast('Erreur archivage : '+error.message,false);return;}
  await DB.from('logs').insert({utilisateur_id:STATE.user.id,action:'ARCHIVE',details:'Saison 2025-2026 archivée'});
  toast('✅ Saison 2025-2026 archivée dans Supabase !');
  document.getElementById('boucle-result').innerHTML='<div class="ok-box">✅ Archivage terminé. Vous pouvez maintenant réinitialiser pour 2026-2027.</div>';
}

async function reinitialiserSaison(){
  if(!confirm('ATTENTION : Cette action efface toutes les écritures, licences, matchs et réunions. Avez-vous bien archivé la saison d\'abord ?'))return;
  if(!confirm('Dernière confirmation : effacer toutes les données de la saison en cours ?'))return;
  await Promise.all([
    DB.from('ecritures').delete().neq('id','00000000-0000-0000-0000-000000000000'),
    DB.from('licences').delete().neq('id','00000000-0000-0000-0000-000000000000'),
    DB.from('matchs').delete().neq('id','00000000-0000-0000-0000-000000000000'),
    DB.from('reunions').delete().neq('id','00000000-0000-0000-0000-000000000000'),
  ]);
  await DB.from('parametres').upsert({cle:'club.saison',valeur:'2026-2027'});
  await DB.from('logs').insert({utilisateur_id:STATE.user.id,action:'REINIT',details:'Réinitialisation pour saison 2026-2027'});
  toast('✅ Réinitialisé pour 2026-2027 !');
  document.getElementById('boucle-result').innerHTML='<div class="ok-box">✅ Réinitialisation terminée. La saison 2026-2027 peut commencer !</div>';
}
